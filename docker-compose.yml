version: '3.9'

services:
  # ── Auth Service (external, do not modify) ─
  auth-service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: gym_auth_service
    restart: unless-stopped
    depends_on:
      auth-postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://gym_user:gym_password@auth-postgres:5432/gym_auth_db?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production-min-32-chars
      JWT_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 12
      CORS_ORIGINS: http://localhost:80,http://localhost
    ports:
      - '3000:3000'
    networks:
      - gym_network

  auth-postgres:
    image: postgres:16-alpine
    container_name: gym_auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gym_password
      POSTGRES_DB: gym_auth_db
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gym_user -d gym_auth_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym_network

  # ── Gym Microservice ────────────────────────
  gym-service:
    build:
      context: ./gym_service
      dockerfile: Dockerfile
    container_name: gym_service
    restart: unless-stopped
    depends_on:
      gym-postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://gym_user:gym_password@gym-postgres:5432/gym_db?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production-min-32-chars
      JWT_ISSUER: gym-auth-service
      JWT_AUDIENCE: gym-app
    ports:
      - '3001:3001'
    networks:
      - gym_network

  gym-postgres:
    image: postgres:16-alpine
    container_name: gym_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gym_password
      POSTGRES_DB: gym_db
    volumes:
      - gym_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gym_user -d gym_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym_network

  # ── Frontend (nginx) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gym_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    networks:
      - gym_network

volumes:
  auth_postgres_data:
  gym_postgres_data:

networks:
  gym_network:
    driver: bridge
